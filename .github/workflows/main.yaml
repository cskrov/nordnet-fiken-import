name: Build and deploy

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - static/**
      - package.json
      - bun.lock
      - bunfig.toml
      - tsconfig.json
      - vite.config.mts
      - biome.json
      - index.html
      - Dockerfile
      - nginx.conf
      - .github/workflows/main.yaml
  workflow_dispatch:

jobs:
  build-and-deply:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Build
        shell: bash
        env:
          VERSION: ${{ github.sha }}
        run: bun run build

      - name: Test
        shell: bash
        run: bun test

      - name: Login to GitHub Container Registry
        run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest .
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Generate hostname
        id: hostname
        run: echo "name=github-deploy-nordnet-fiken-import-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Connect to Netbird
        uses: Alemiz112/netbird-connect@fbea46300ca7ee907ff7d8e39ede3f556a6ecf10 # v1.0.2
        with:
          setup-key: ${{ secrets.NETBIRD_SETUP_KEY }}
          hostname: ${{ steps.hostname.outputs.name }}

      - name: Trigger deploy
        run: curl -fsS -X GET --retry 30 --retry-delay 1 --retry-all-errors "${{ secrets.DEPLOY_WEBHOOK }}"
