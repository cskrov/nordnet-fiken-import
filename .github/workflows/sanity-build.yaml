name: Sanity Build

on:
  pull_request:
  workflow_dispatch:

jobs:
  sanity-build:
    strategy:
      fail-fast: false
    name: Sanity Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Knip
        run: bun run knip

      - name: Test
        run: bun test
